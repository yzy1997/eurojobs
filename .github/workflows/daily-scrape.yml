name: Daily Scraper

on:
  schedule:
    # 每天凌晨 3:00 (UTC+8 = 19:00 UTC)
    - cron: '0 19 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  trigger-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scraper on Railway
        run: |
          curl -X GET "${{ secrets.RAILWAY_API_URL }}/api/scrape"
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}